name: module10-capstone-portal
region: nyc
services:
  - name: web
    image:
      registry_type: DOCR
      repository: module10-capstone-portal
      tag: latest
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: PORT
        value: "8000"
        scope: RUN_TIME
