services:
  capstone-portal:
    build: .
    image: trainingcred/module10-capstone-portal:local
    container_name: module10-capstone-portal
    environment:
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
